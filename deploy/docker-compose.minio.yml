# MinIO object store backing TaskTrack attachments.
#
# Personal dev (Nexus): brought up by the user systemd unit
# minio-tasktrack.service. Credentials live in deploy/minio.env (gitignored,
# created from minio.env.example on first run).
#
# Company VM: same compose, but the env file is rendered by scripts/install.sh
# into /etc/tasktrack/minio.env with generated random credentials.
#
# Bucket creation is handled by deploy/setup-minio.sh — run it once after
# the container is healthy.
#
# Both API (:9000) and console (:9001) bind to 127.0.0.1 only — never expose
# MinIO on the LAN; the Flask app talks to it locally and proxies presigned
# URLs out via its own auth.

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: tasktrack-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER not set — copy deploy/minio.env.example to deploy/minio.env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD not set}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minio_data:
    name: tasktrack-minio-data
