<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submission Forms | TaskTrack</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f6f7f9; --surface:#fff; --border:#e2e5ea; --text:#1a1d23; --text-muted:#6b7280;
    --accent:#2563eb; --accent-hover:#1d4ed8; --shadow:0 10px 24px rgba(0,0,0,0.08); --radius:12px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'IBM Plex Sans',-apple-system,sans-serif; background:linear-gradient(180deg, #eef4ff 0%, var(--bg) 22%); color:var(--text); min-height:100vh; }
  .page { max-width:1080px; margin:0 auto; padding:2rem 1.2rem 3rem; }
  .hero, .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }
  .hero { padding:1.3rem 1.4rem; margin-bottom:1rem; }
  .brand { font-family:'IBM Plex Mono',monospace; font-weight:600; color:var(--text-muted); margin-bottom:0.4rem; }
  .brand span { color:var(--accent); }
  h1 { font-size:1.8rem; margin-bottom:0.45rem; }
  .intro { color:var(--text-muted); max-width:760px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px, 1fr)); gap:0.9rem; }
  .card { padding:1rem; }
  .card h2 { font-size:1rem; margin-bottom:0.3rem; }
  .card p { font-size:0.9rem; color:var(--text-muted); min-height:3.8em; margin-bottom:0.9rem; }
  .btn { display:inline-block; text-decoration:none; background:var(--accent); color:#fff; padding:0.7rem 0.95rem; border-radius:10px; font-size:0.88rem; font-weight:600; }
  .btn:hover { background:var(--accent-hover); }
  .back { display:inline-block; margin-top:1rem; color:var(--accent); text-decoration:none; font-weight:600; }
</style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="brand"><span>//</span> TaskTrack</div>
      <h1>Submission Forms</h1>
      <p class="intro">Use these simplified forms when someone needs to submit work, observations, or ideas without using the full dashboard.</p>
    </section>
    <section class="grid">
      {% for form in forms %}
      <article class="card">
        <h2>{{ form.title }}</h2>
        <p>{{ form.copy }}</p>
        <a class="btn" href="{{ form.href }}">Open Form</a>
      </article>
      {% endfor %}
    </section>
    <a class="back" href="/">Back to TaskTrack Dashboard</a>
  </main>
</body>
</html>
