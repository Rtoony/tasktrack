[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [
    "migrations/versions",
    "app.py.pre-1a3.bak",
    "scripts",
]

[tool.ruff.lint]
# Conservative starter set: only the rules we're confident the codebase
# can pass today. Pyflakes (F), pycodestyle errors (E), import sorting
# (I), and a few obvious bug-catchers. We can broaden later.
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",   # line length — IBM Plex Mono templates have long inline strings
    "B008",   # function calls in defaults (Flask uses this idiomatically)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B018"]  # don't flag "useless expression" in test fixtures

[tool.coverage.run]
source = ["app"]
omit = [
    "app/cli.py",
    "app/logging_config.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
show_missing = true
skip_covered = false
